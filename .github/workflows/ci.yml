name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Check formatting
        shell: bash
        run: test -z "$(go run mvdan.cc/gofumpt@v0.8.0 -l .)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        if: runner.os == 'Linux'
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6 run

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Race tests
        run: go test -race ./...
